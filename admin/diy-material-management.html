<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <%- include('partials/head', {
    title: 'DIY 珠子素材管理',
    pageStyle: '[x-cloak] { display: none !important; }'
  }) %>
</head>
<body class="themed-bg-subtle min-h-screen">

  <nav class="page-navbar">
    <div class="container mx-auto px-4 py-3 flex justify-between items-center">
      <div class="flex items-center space-x-4">
        <a href="/admin/workspace.html" class="text-blue-200 hover:text-white transition-colors">← 返回工作台</a>
        <span class="text-lg font-semibold">💎 DIY 珠子素材管理</span>
      </div>
    </div>
  </nav>

  <div class="container mx-auto px-4 py-6"
       x-data="diyMaterialManagement()"
       x-init="init()">

    <div x-cloak class="space-y-6">

      <!-- 统计卡片 -->
      <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
        <div class="bg-white rounded-xl shadow p-4">
          <div class="text-xs text-gray-500">素材总数</div>
          <div class="text-2xl font-bold text-blue-600 mt-1" x-text="total"></div>
        </div>
        <div class="bg-white rounded-xl shadow p-4">
          <div class="text-xs text-gray-500">已启用</div>
          <div class="text-2xl font-bold text-green-600 mt-1" x-text="materials.filter(m => m.is_enabled).length"></div>
        </div>
        <div class="bg-white rounded-xl shadow p-4">
          <div class="text-xs text-gray-500">材料分组</div>
          <div class="text-2xl font-bold text-purple-600 mt-1" x-text="groupOptions.length"></div>
        </div>
        <div class="bg-white rounded-xl shadow p-4">
          <div class="text-xs text-gray-500">尺寸规格</div>
          <div class="text-sm font-semibold text-amber-600 mt-1" x-text="[...new Set(materials.map(m => m.diameter))].sort((a,b) => a-b).map(d => d + 'mm').join(' / ') || '-'"></div>
        </div>
      </div>

      <!-- 筛选栏 -->
      <div class="bg-white rounded-xl shadow p-4">
        <div class="flex flex-wrap items-end gap-3">
          <div>
            <label class="block text-xs text-gray-500 mb-1">材料分组</label>
            <select x-model="filterGroup" class="input-field text-sm">
              <option value="">全部</option>
              <template x-for="g in groupOptions" :key="g">
                <option :value="g" x-text="groupLabels[g] || g"></option>
              </template>
            </select>
          </div>
          <div>
            <label class="block text-xs text-gray-500 mb-1">直径</label>
            <select x-model="filterDiameter" class="input-field text-sm">
              <option value="">全部</option>
              <template x-for="d in diameterOptions" :key="d">
                <option :value="d" x-text="d + 'mm'"></option>
              </template>
            </select>
          </div>
          <div>
            <label class="block text-xs text-gray-500 mb-1">关键词</label>
            <input type="text" x-model="filterKeyword" placeholder="素材名称/编码" class="input-field text-sm">
          </div>
          <button @click="applyFilter()" class="px-4 py-2 bg-blue-600 text-white text-sm rounded-lg hover:bg-blue-700">筛选</button>
          <button @click="resetFilter()" class="px-4 py-2 border text-sm rounded-lg hover:bg-gray-50">重置</button>
          <div class="flex-1"></div>
          <button @click="openCreateForm()" class="px-4 py-2 bg-green-600 text-white text-sm rounded-lg hover:bg-green-700">+ 新增素材</button>
        </div>
      </div>

      <!-- 素材列表 -->
      <div class="bg-white rounded-xl shadow overflow-hidden">
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead class="bg-gray-50 text-gray-600">
              <tr>
                <th class="px-4 py-3 text-left">ID</th>
                <th class="px-4 py-3 text-left">图片</th>
                <th class="px-4 py-3 text-left">素材编码</th>
                <th class="px-4 py-3 text-left">名称</th>
                <th class="px-4 py-3 text-left">材质</th>
                <th class="px-4 py-3 text-left">分组</th>
                <th class="px-4 py-3 text-center">直径</th>
                <th class="px-4 py-3 text-center">形状</th>
                <th class="px-4 py-3 text-right">单价</th>
                <th class="px-4 py-3 text-center">库存</th>
                <th class="px-4 py-3 text-center">启用</th>
                <th class="px-4 py-3 text-right">操作</th>
              </tr>
            </thead>
            <tbody>
              <template x-for="mat in materials" :key="mat.diy_material_id">
                <tr class="border-t hover:bg-gray-50">
                  <td class="px-4 py-3 text-gray-500" x-text="mat.diy_material_id"></td>
                  <td class="px-4 py-3">
                    <img x-show="mat.image_media?.public_url"
                         :src="mat.image_media?.public_url"
                         class="w-10 h-10 object-cover rounded border bg-gray-50"
                         loading="lazy">
                    <span x-show="!mat.image_media?.public_url" class="text-gray-300 text-xs">无图</span>
                  </td>
                  <td class="px-4 py-3 font-mono text-xs" x-text="mat.material_code"></td>
                  <td class="px-4 py-3 font-medium" x-text="mat.display_name"></td>
                  <td class="px-4 py-3 text-gray-600" x-text="mat.material_name"></td>
                  <td class="px-4 py-3">
                    <span class="px-2 py-0.5 rounded text-xs"
                          :class="getGroupBadgeClass(mat.group_code)"
                          x-text="groupLabels[mat.group_code] || mat.group_code"></span>
                  </td>
                  <td class="px-4 py-3 text-center" x-text="mat.diameter + 'mm'"></td>
                  <td class="px-4 py-3 text-center text-xs text-gray-500" x-text="shapeLabels[mat.shape] || mat.shape"></td>
                  <td class="px-4 py-3 text-right font-medium" x-text="'¥' + mat.price"></td>
                  <td class="px-4 py-3 text-center">
                    <span x-text="mat.stock === -1 ? '∞' : mat.stock"
                          :class="mat.stock === 0 ? 'text-red-500' : 'text-gray-600'"></span>
                  </td>
                  <td class="px-4 py-3 text-center">
                    <span x-show="mat.is_enabled" class="text-green-600">✓</span>
                    <span x-show="!mat.is_enabled" class="text-red-400">✗</span>
                  </td>
                  <td class="px-4 py-3 text-right space-x-2">
                    <button @click="openEditForm(mat.diy_material_id)" class="text-blue-600 hover:underline text-xs">编辑</button>
                    <button @click="handleDelete(mat.diy_material_id, mat.display_name)" class="text-red-500 hover:underline text-xs">删除</button>
                  </td>
                </tr>
              </template>
              <tr x-show="!loading && materials.length === 0">
                <td colspan="12" class="px-4 py-8 text-center text-gray-400">暂无素材数据</td>
              </tr>
              <tr x-show="loading">
                <td colspan="12" class="px-4 py-8 text-center text-gray-400">加载中...</td>
              </tr>
            </tbody>
          </table>
        </div>

        <!-- 分页 -->
        <div class="px-4 py-3 border-t flex justify-between items-center text-sm text-gray-500">
          <span>共 <span x-text="total"></span> 条</span>
          <div class="flex gap-2">
            <button @click="goToPage(page - 1)" :disabled="page <= 1"
                    class="px-3 py-1 border rounded disabled:opacity-40">上一页</button>
            <span class="px-3 py-1">第 <span x-text="page"></span> / <span x-text="totalPages"></span> 页</span>
            <button @click="goToPage(page + 1)" :disabled="page >= totalPages"
                    class="px-3 py-1 border rounded disabled:opacity-40">下一页</button>
          </div>
        </div>
      </div>

      <!-- 新建/编辑弹窗 -->
      <div x-show="showFormModal" x-transition class="fixed inset-0 z-50 flex items-center justify-center bg-black/40">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-2xl max-h-[90vh] overflow-y-auto">
          <div class="p-4 border-b flex justify-between items-center">
            <h3 class="text-lg font-semibold" x-text="editingId ? '编辑素材' : '新增素材'"></h3>
            <button @click="showFormModal = false" class="text-gray-400 hover:text-gray-600 text-xl">&times;</button>
          </div>
          <div class="p-4 space-y-4">

            <div class="grid grid-cols-2 gap-4">
              <div>
                <label class="block text-xs text-gray-500 mb-1">素材名称 *</label>
                <input type="text" x-model="form.display_name" class="input-field w-full" placeholder="如：巴西黄水晶">
              </div>
              <div>
                <label class="block text-xs text-gray-500 mb-1">材质名称 *</label>
                <input type="text" x-model="form.material_name" class="input-field w-full" placeholder="如：黄水晶">
              </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
              <div>
                <label class="block text-xs text-gray-500 mb-1">素材编码 *</label>
                <input type="text" x-model="form.material_code" class="input-field w-full" placeholder="如：yellow_crystal_10mm">
              </div>
              <div>
                <label class="block text-xs text-gray-500 mb-1">材料分组 *</label>
                <select x-model="form.group_code" class="input-field w-full">
                  <option value="">请选择</option>
                  <template x-for="g in allGroupOptions" :key="g.value">
                    <option :value="g.value" x-text="g.label"></option>
                  </template>
                </select>
              </div>
            </div>

            <div class="grid grid-cols-3 gap-4">
              <div>
                <label class="block text-xs text-gray-500 mb-1">直径 (mm) *</label>
                <input type="number" x-model.number="form.diameter" class="input-field w-full" min="1" max="50" step="0.5">
              </div>
              <div>
                <label class="block text-xs text-gray-500 mb-1">切割形状</label>
                <select x-model="form.shape" class="input-field w-full">
                  <option value="circle">圆形</option>
                  <option value="ellipse">椭圆</option>
                  <option value="oval">卵形</option>
                  <option value="square">方形</option>
                  <option value="heart">心形</option>
                  <option value="teardrop">水滴形</option>
                </select>
              </div>
              <div>
                <label class="block text-xs text-gray-500 mb-1">库存（-1=无限）</label>
                <input type="number" x-model.number="form.stock" class="input-field w-full" min="-1">
              </div>
            </div>

            <div class="grid grid-cols-3 gap-4">
              <div>
                <label class="block text-xs text-gray-500 mb-1">单价 *</label>
                <input type="number" x-model.number="form.price" class="input-field w-full" min="0" step="0.01">
              </div>
              <div>
                <label class="block text-xs text-gray-500 mb-1">定价币种</label>
                <select x-model="form.price_asset_code" class="input-field w-full">
                  <option value="DIAMOND">钻石</option>
                  <option value="POINTS">积分</option>
                </select>
              </div>
              <div>
                <label class="block text-xs text-gray-500 mb-1">排序</label>
                <input type="number" x-model.number="form.sort_order" class="input-field w-full" min="0">
              </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
              <div>
                <label class="block text-xs text-gray-500 mb-1">启用状态</label>
                <select x-model="form.is_enabled" class="input-field w-full">
                  <option :value="true">启用</option>
                  <option :value="false">禁用</option>
                </select>
              </div>
              <div>
                <label class="block text-xs text-gray-500 mb-1">可叠加</label>
                <select x-model="form.is_stackable" class="input-field w-full">
                  <option :value="true">是（同款可多颗）</option>
                  <option :value="false">否</option>
                </select>
              </div>
            </div>

            <!-- 素材图片上传 -->
            <div>
              <label class="block text-xs text-gray-500 mb-1">素材图片（PNG 透明底）</label>
              <div class="flex items-center gap-4">
                <div class="w-20 h-20 border rounded bg-gray-50 flex items-center justify-center overflow-hidden">
                  <img x-show="imagePreviewUrl" :src="imagePreviewUrl" class="w-full h-full object-contain">
                  <span x-show="!imagePreviewUrl" class="text-gray-300 text-xs">无图</span>
                </div>
                <div>
                  <input type="file" accept="image/png,image/webp" @change="handleImageUpload($event)" class="text-sm">
                  <p class="text-xs text-gray-400 mt-1">建议 PNG 透明底，600×600px</p>
                </div>
              </div>
            </div>

          </div>
          <div class="p-4 border-t flex justify-end gap-2">
            <button @click="showFormModal = false" class="px-4 py-2 text-sm border rounded-lg">取消</button>
            <button @click="saveMaterial()" :disabled="saving"
                    class="px-4 py-2 text-sm bg-blue-600 text-white rounded-lg disabled:opacity-50"
                    x-text="editingId ? '保存修改' : '创建素材'"></button>
          </div>
        </div>
      </div>

    </div>
  </div>

  <%- include('partials/footer') %>
  <script type="module" src="./src/modules/diy/pages/diy-material-management.js"></script>
</body>
</html>
