<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="/admin/favicon.svg">
<title>系统维护 - 管理后台</title>
<style>[x-cloak] { display: none !important; }</style>

<style>[x-cloak] { display: none !important; } .tab-content-frame { border: none; width: 100%; min-height: calc(100vh - 180px); }</style>



  <script type="module" crossorigin src="/admin/assets/sys-maintain-BPmP6LcA.js"></script>
  <link rel="modulepreload" crossorigin href="/admin/assets/alpine-DHMHVPoE.js">
  <link rel="modulepreload" crossorigin href="/admin/assets/vendor-z_UyD9yt.js">
  <link rel="modulepreload" crossorigin href="/admin/assets/echarts-DsXiNbrD.js">
  <link rel="modulepreload" crossorigin href="/admin/assets/vendor-socketio-DdI-Egwi.js">
  <link rel="modulepreload" crossorigin href="/admin/assets/index-BzZd00Na.js">
  <link rel="modulepreload" crossorigin href="/admin/assets/main-CD4ziYoF.js">
  <link rel="stylesheet" crossorigin href="/admin/assets/index-Cdcizjov.css">
</head>
<body class="themed-bg-subtle min-h-screen">
  
  <!-- 导航栏 -->
  <nav class="themed-bg-primary text-white shadow-lg">
    <div class="container mx-auto px-4 py-3 flex justify-between items-center">
      <div class="flex items-center space-x-4">
        <a href="/admin/workspace.html" class="hover:text-blue-200">← 返回工作台</a>
        <span class="text-lg font-semibold">🔧 系统维护</span>
      </div>
    </div>
  </nav>

  <!-- 页面主体 -->
  <div class="container mx-auto px-4 py-6" x-data="sysMaintainPage()" x-init="init()">
    
    <!-- Tab导航 -->
    <div class="themed-card rounded-lg shadow mb-6">
      <div class="flex border-b overflow-x-auto">
        <template x-for="tab in tabs" :key="tab.id">
          <button 
            @click="switchTab(tab.id)"
            :class="currentTab === tab.id ? 'border-b-2 themed-border-primary themed-text-primary themed-bg-primary-light' : 'themed-text-muted themed-hover-bg'"
            class="px-6 py-3 font-medium whitespace-nowrap transition-colors"
            x-text="tab.icon + ' ' + tab.name"
          ></button>
        </template>
      </div>
    </div>

    <!-- Tab内容区域 -->
    <div class="themed-card rounded-lg shadow overflow-hidden">
      <!-- 系统配置 -->
      <div x-show="currentTab === 'settings'" x-cloak>
        <iframe 
          src="/admin/system-settings.html?embed=true" 
          class="tab-content-frame"
          x-ref="settingsFrame"
        ></iframe>
      </div>
      
      <!-- 会话管理 -->
      <div x-show="currentTab === 'sessions'" x-cloak>
        <iframe 
          src="/admin/sessions.html?embed=true" 
          class="tab-content-frame"
          x-ref="sessionsFrame"
        ></iframe>
      </div>
      
      <!-- 操作审计 -->
      <div x-show="currentTab === 'audit-logs'" x-cloak>
        <iframe 
          src="/admin/audit-logs.html?embed=true" 
          class="tab-content-frame"
          x-ref="auditLogsFrame"
        ></iframe>
      </div>
      
      <!-- 高级工具 -->
      <div x-show="currentTab === 'config-tools'" x-cloak>
        <iframe 
          src="/admin/config-tools.html?embed=true" 
          class="tab-content-frame"
          x-ref="configToolsFrame"
        ></iframe>
      </div>
    </div>

  </div>

  <!-- 页面底部 - 可用于全局脚本或版权信息 -->



</body>
</html>
