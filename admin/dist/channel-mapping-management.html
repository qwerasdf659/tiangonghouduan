<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="/admin/favicon.svg">
<title>渠道映射管理 - 管理后台</title>
<style>[x-cloak] { display: none !important; }</style>

<style>[x-cloak] { display: none !important; }</style>



  <script type="module" crossorigin src="/admin/assets/channel-mapping-management-yZHjii20.js"></script>
  <link rel="modulepreload" crossorigin href="/admin/assets/alpine-DHMHVPoE.js">
  <link rel="modulepreload" crossorigin href="/admin/assets/vendor-z_UyD9yt.js">
  <link rel="modulepreload" crossorigin href="/admin/assets/echarts-DsXiNbrD.js">
  <link rel="modulepreload" crossorigin href="/admin/assets/vendor-socketio-DdI-Egwi.js">
  <link rel="modulepreload" crossorigin href="/admin/assets/index-C5xulW0E.js">
  <link rel="modulepreload" crossorigin href="/admin/assets/main-Crfp49js.js">
  <link rel="modulepreload" crossorigin href="/admin/assets/index-BLe2DV9Q.js">
  <link rel="stylesheet" crossorigin href="/admin/assets/index-ClYS6XHm.css">
</head>
<body class="themed-bg-subtle min-h-screen">
  <nav class="bg-gray-800 text-white shadow-lg">
    <div class="container mx-auto px-4 py-3 flex justify-between items-center">
      <div class="flex items-center space-x-4">
        <a href="/admin/workspace.html" class="hover:text-gray-300 transition-colors">← 返回工作台</a>
        <span class="text-lg font-semibold">🔗 渠道映射管理</span>
      </div>
      <div class="flex items-center space-x-4">
        <span x-data x-text="$store.auth?.user?.nickname ? `欢迎，${$store.auth.user.nickname}` : '欢迎，管理员'" class="text-sm text-gray-300">欢迎，管理员</span>
      </div>
    </div>
  </nav>

  <div class="container mx-auto px-4 py-6" x-data="channelMappingManagement()" x-cloak>
    <div class="themed-card rounded-xl shadow-sm mb-6 overflow-hidden">
      <div class="px-5 py-4 bg-gradient-to-r from-slate-50 to-white border-b themed-border">
        <div class="flex flex-wrap gap-4 items-end">
          <div class="flex-1 min-w-[160px]">
            <label class="block text-xs font-medium themed-text-muted mb-1.5">关键词</label>
            <input type="text" x-model="filters.keyword" @keyup.enter="handleSearch()" placeholder="external_item_id / channel" class="w-full px-3 py-2 text-sm border rounded-lg themed-border focus:ring-2 focus:ring-cyan-500">
          </div>
          <div class="w-36">
            <label class="block text-xs font-medium themed-text-muted mb-1.5">exchange_item_id</label>
            <input type="number" x-model="filters.exchange_item_id" @change="handleSearch()" class="w-full px-3 py-2 text-sm border rounded-lg themed-border">
          </div>
          <div class="w-32">
            <label class="block text-xs font-medium themed-text-muted mb-1.5">channel</label>
            <select x-model="filters.channel" @change="handleSearch()" class="w-full px-3 py-2 text-sm border rounded-lg themed-border">
              <option value="">全部</option>
              <template x-for="ch in channelDict" :key="ch.code">
                <option :value="ch.code" x-text="ch.name"></option>
              </template>
            </select>
          </div>
          <div class="w-32">
            <label class="block text-xs font-medium themed-text-muted mb-1.5">sync_status</label>
            <select x-model="filters.sync_status" @change="handleSearch()" class="w-full px-3 py-2 text-sm border rounded-lg themed-border">
              <option value="">全部</option>
              <option value="pending">待同步</option>
              <option value="synced">已同步</option>
              <option value="failed">同步失败</option>
              <option value="disabled">已禁用</option>
            </select>
          </div>
          <div class="flex gap-2">
            <button @click="handleSearch()" class="px-4 py-2 text-sm themed-bg-primary text-white rounded-lg">🔍 搜索</button>
            <button @click="resetFilters()" class="px-4 py-2 text-sm border rounded-lg themed-border hover:bg-gray-50">🔄 重置</button>
            <button @click="openCreateForm()" class="px-4 py-2 text-sm themed-gradient-primary text-white rounded-lg">➕ 新建映射</button>
          </div>
        </div>
      </div>
    </div>

    <div class="themed-card rounded-xl shadow-sm border overflow-hidden">
      <div class="px-5 py-3 bg-gradient-to-r from-slate-50 to-white border-b themed-border flex items-center gap-2">
        <span class="text-sm font-semibold themed-text">渠道映射列表</span>
        <span class="px-2 py-0.5 text-xs font-medium bg-cyan-100 text-cyan-600 rounded-full" x-text="total + ' 条'"></span>
      </div>
      <div x-show="loading" class="p-12 text-center"><div class="animate-spin text-3xl mb-3">⏳</div><p class="text-sm">加载中...</p></div>
      <div x-show="!loading && items.length === 0" class="p-12 text-center">
        <p class="text-lg font-medium themed-text mb-2">暂无渠道映射</p>
        <button @click="openCreateForm()" class="px-4 py-2 text-sm themed-gradient-primary text-white rounded-lg">➕ 新建映射</button>
      </div>
      <table x-show="!loading && items.length > 0" class="w-full text-sm">
        <thead>
          <tr class="bg-gradient-to-r from-slate-50 to-gray-50 border-b themed-border">
            <th class="px-4 py-3 text-left text-xs font-semibold themed-text-muted">id</th>
            <th class="px-4 py-3 text-left text-xs font-semibold themed-text-muted">channel</th>
            <th class="px-4 py-3 text-left text-xs font-semibold themed-text-muted">external_item_id</th>
            <th class="px-4 py-3 text-left text-xs font-semibold themed-text-muted">我方商品</th>
            <th class="px-4 py-3 text-center text-xs font-semibold themed-text-muted">sync_status</th>
            <th class="px-4 py-3 text-right text-xs font-semibold themed-text-muted">channel_price</th>
            <th class="px-4 py-3 text-left text-xs font-semibold themed-text-muted">last_synced_at</th>
            <th class="px-4 py-3 text-center text-xs font-semibold themed-text-muted">操作</th>
          </tr>
        </thead>
        <tbody class="divide-y themed-border">
          <template x-for="row in items" :key="row.id">
            <tr class="hover:bg-cyan-50/30">
              <td class="px-4 py-3 font-mono text-xs" x-text="'#' + row.id"></td>
              <td class="px-4 py-3" x-text="channelLabel(row.channel)"></td>
              <td class="px-4 py-3 font-mono text-xs" x-text="row.external_item_id"></td>
              <td class="px-4 py-3" x-text="row.exchangeItem?.item_name || row.exchange_item_id"></td>
              <td class="px-4 py-3 text-center">
                <span class="px-2 py-0.5 rounded-full text-xs font-medium" :class="syncStatusClass(row.sync_status)" x-text="syncStatusLabel(row.sync_status)"></span>
              </td>
              <td class="px-4 py-3 text-right font-mono text-xs" x-text="row.channel_price != null ? '¥' + row.channel_price : '取我方价'"></td>
              <td class="px-4 py-3 text-xs themed-text-muted" x-text="row.last_synced_at ? formatDate(row.last_synced_at) : '-'"></td>
              <td class="px-4 py-3">
                <div class="flex justify-center gap-1">
                  <button @click="openEditForm(mappingId(row))" class="px-2 py-1 text-xs text-green-600 hover:bg-green-50 rounded">编辑</button>
                  <button @click="handleDelete(mappingId(row), row.external_item_id)" class="px-2 py-1 text-xs text-red-600 hover:bg-red-50 rounded">删除</button>
                </div>
              </td>
            </tr>
          </template>
        </tbody>
      </table>
      <div x-show="total > 0" class="px-5 py-3 flex justify-between items-center bg-gradient-to-r from-slate-50 to-gray-50 border-t themed-border">
        <span class="text-xs themed-text-muted">共 <span x-text="total"></span> 条，第 <span x-text="pagination.page"></span>/<span x-text="totalPages"></span> 页</span>
        <div class="flex gap-1">
          <button @click="goToPage(pagination.page - 1)" :disabled="!hasPrevPage" class="px-3 py-1.5 border rounded-lg text-xs themed-border" :class="hasPrevPage ? '' : 'opacity-40'">← 上一页</button>
          <button @click="goToPage(pagination.page + 1)" :disabled="!hasNextPage" class="px-3 py-1.5 border rounded-lg text-xs themed-border" :class="hasNextPage ? '' : 'opacity-40'">下一页 →</button>
        </div>
      </div>
    </div>

    <div x-show="show_form" class="fixed inset-0 z-50 flex items-center justify-center" x-cloak>
      <div class="absolute inset-0 bg-black/50" @click="closeForm()"></div>
      <div class="relative themed-card rounded-2xl shadow-2xl w-full max-w-lg mx-4 border themed-border">
        <div class="px-6 py-4 themed-gradient-primary rounded-t-2xl flex justify-between">
          <h3 class="text-lg font-bold text-white" x-text="is_edit ? '✏️ 编辑映射' : '➕ 新建映射'"></h3>
          <button @click="closeForm()" class="text-white/80 hover:text-white text-xl">&times;</button>
        </div>
        <form @submit.prevent="submitForm()" class="px-6 py-5 space-y-4">
          <div>
            <label class="block text-xs font-semibold mb-1.5">channel <span class="text-red-500">*</span></label>
            <select x-model="form.channel" required class="w-full px-3 py-2 text-sm border rounded-lg themed-border">
              <template x-for="ch in channelDict" :key="ch.code">
                <option :value="ch.code" x-text="ch.name + '（' + ch.code + '）'"></option>
              </template>
            </select>
            <p class="text-xs themed-text-muted mt-1">渠道由系统字典维护（字典类型 distribution_channel），加渠道零发版</p>
          </div>
          <div>
            <label class="block text-xs font-semibold mb-1.5">external_item_id <span class="text-red-500">*</span></label>
            <input type="text" x-model="form.external_item_id" required class="w-full px-3 py-2 text-sm border rounded-lg themed-border font-mono">
          </div>
          <div>
            <label class="block text-xs font-semibold mb-1.5">exchange_item_id <span class="text-red-500">*</span></label>
            <input type="number" x-model="form.exchange_item_id" required class="w-full px-3 py-2 text-sm border rounded-lg themed-border">
          </div>
          <div>
            <label class="block text-xs font-semibold mb-1.5">sync_status</label>
            <select x-model="form.sync_status" class="w-full px-3 py-2 text-sm border rounded-lg themed-border">
              <option value="pending">pending</option>
              <option value="synced">synced</option>
              <option value="failed">failed</option>
              <option value="disabled">disabled</option>
            </select>
          </div>
          <div>
            <label class="block text-xs font-semibold mb-1.5">channel_price（渠道独立售价，元）</label>
            <input type="number" step="0.01" min="0" x-model="form.channel_price" placeholder="留空 = 默认取我方价"
                   class="w-full px-3 py-2 text-sm border rounded-lg themed-border">
            <p class="text-xs themed-text-muted mt-1">拍板 #26：各渠道可独立加价，留空则默认取我方价</p>
          </div>
          <div class="flex justify-end gap-3 pt-3 border-t themed-border">
            <button type="button" @click="closeForm()" class="px-5 py-2.5 text-sm border rounded-lg themed-border">取消</button>
            <button type="submit" :disabled="saving" class="px-5 py-2.5 text-sm themed-gradient-primary text-white rounded-lg disabled:opacity-50" x-text="is_edit ? '💾 保存' : '✅ 创建'"></button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- 页面底部 - 可用于全局脚本或版权信息 -->


</body>
</html>
