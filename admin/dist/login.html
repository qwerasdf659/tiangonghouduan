<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="/admin/favicon.svg">
<title>管理后台 - 管理后台</title>
<style>[x-cloak] { display: none !important; }</style>

<style>[x-cloak] { display: none !important; } .login-container { min-height: 100vh; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }</style>



  <!-- 
    安全措施：检测是否在 iframe 中
    如果登录页在 iframe 中显示（说明权限过期后跳转到了 iframe 内的登录页），
    需要跳出 iframe 到顶层窗口，避免侧边栏泄露信息
  -->
  <script>
    (function() {
      // 检测是否在 iframe 中
      if (window.self !== window.top) {
        console.log('[Login] 检测到登录页在 iframe 中，跳出到顶层窗口');
        try {
          // 直接让顶层窗口跳转到登录页
          window.top.location.href = '/admin/login.html';
        } catch (e) {
          // 如果因为跨域无法直接操作，尝试 postMessage
          console.warn('[Login] 无法直接跳转顶层窗口，尝试 postMessage', e);
          window.parent.postMessage({ type: 'AUTH_EXPIRED', redirect: '/admin/login.html' }, '*');
        }
      }
    })();
  </script>
  <script type="module" crossorigin src="/admin/assets/login-Cnykht2J.js"></script>
  <link rel="modulepreload" crossorigin href="/admin/assets/alpine-DHMHVPoE.js">
  <link rel="modulepreload" crossorigin href="/admin/assets/vendor-z_UyD9yt.js">
  <link rel="modulepreload" crossorigin href="/admin/assets/echarts-DsXiNbrD.js">
  <link rel="modulepreload" crossorigin href="/admin/assets/vendor-socketio-DdI-Egwi.js">
  <link rel="modulepreload" crossorigin href="/admin/assets/index-C5xulW0E.js">
  <link rel="modulepreload" crossorigin href="/admin/assets/main-Crfp49js.js">
  <link rel="modulepreload" crossorigin href="/admin/assets/auth-D3t3OmBM.js">
  <link rel="stylesheet" crossorigin href="/admin/assets/index-ClYS6XHm.css">
</head>
<body class="login-container flex items-center justify-center">

  <!-- 登录表单容器 -->
  <div class="container mx-auto px-4" x-data="loginPage()" x-cloak>
    <div class="flex justify-center">
      <div class="w-full max-w-md">
        <div class="bg-white/95 backdrop-blur-lg rounded-2xl shadow-2xl overflow-hidden">
          <div class="p-8">
            <!-- 标题区域 -->
            <div class="text-center mb-8">
              <div class="mb-4">
                <span class="text-6xl">🔐</span>
              </div>
              <h3 class="text-2xl font-bold themed-text mb-1">管理后台</h3>
              <p class="themed-text-muted">天工平台 V4.0</p>
            </div>
            
            <!-- 登录表单 -->
            <form @submit.prevent="handleLogin" @keydown.enter="handleLogin">
              <!-- 手机号输入 -->
              <div class="mb-4 form-group" :class="{ 'is-valid': phone && phone.length === 11, 'is-invalid': phone && phone.length !== 11 && phone.length > 0 }">
                <label class="block text-sm font-medium themed-text-secondary mb-2">
                  📱 手机号
                </label>
                <div class="relative">
                  <input 
                    type="tel" 
                    class="w-full px-4 py-3 border themed-border rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-purple-500 transition-all keyboard-focus"
                    :class="{ 'is-valid': phone && phone.length === 11, 'is-invalid': phone && phone.length !== 11 && phone.length > 0 }"
                    x-model="phone"
                    placeholder="请输入手机号"
                    :disabled="loading"
                    maxlength="11"
                    required
                  >
                  <span class="validation-icon"></span>
                </div>
                <p class="invalid-feedback">请输入11位手机号</p>
              </div>
              
              <!-- 验证码输入 -->
              <div class="mb-6 form-group" :class="{ 'is-valid': code && code.length === 6, 'is-invalid': code && code.length !== 6 && code.length > 0 }">
                <label class="block text-sm font-medium themed-text-secondary mb-2">
                  🔒 验证码
                </label>
                <div class="flex gap-2">
                  <div class="relative flex-1">
                    <input 
                      type="text" 
                      class="w-full px-4 py-3 border themed-border rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-purple-500 transition-all keyboard-focus"
                      :class="{ 'is-valid': code && code.length === 6, 'is-invalid': code && code.length !== 6 && code.length > 0 }"
                      x-model="code"
                      placeholder="请输入验证码"
                      :disabled="loading"
                      maxlength="6"
                      required
                    >
                    <span class="validation-icon"></span>
                  </div>
                  <!-- 发送验证码按钮（60秒倒计时） -->
                  <button 
                    type="button"
                    class="px-4 py-3 whitespace-nowrap themed-border border rounded-lg themed-text-primary font-medium transition-all disabled:opacity-50 disabled:cursor-not-allowed btn-scale"
                    :disabled="loading || sending || countdown > 0 || !(phone && phone.length === 11)"
                    @click="getCode"
                  >
                    <span x-show="!sending && countdown === 0">获取验证码</span>
                    <span x-show="sending">发送中...</span>
                    <span x-show="countdown > 0" x-text="countdown + 's 后重发'"></span>
                  </button>
                </div>
                <p class="valid-feedback">✓ 验证码格式正确</p>
                <p class="invalid-feedback">请输入6位验证码</p>
                <p class="mt-2 text-sm themed-text-muted">
                  ℹ️ 非生产环境可用万能验证码：123456
                </p>
              </div>
              
              <!-- 登录按钮 -->
              <button 
                type="submit" 
                class="w-full py-3 px-4 themed-gradient-primary text-white font-medium rounded-lg focus:ring-4 transition-all disabled:opacity-50 disabled:cursor-not-allowed btn-scale"
                :disabled="loading"
              >
                <template x-if="!loading">
                  <span>➡️ 登 录</span>
                </template>
                <template x-if="loading">
                  <span class="flex items-center justify-center">
                    <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    登录中...
                  </span>
                </template>
              </button>
            </form>
            
            <!-- 状态消息 -->
            <div 
              x-show="message" 
              x-transition
              class="mt-6"
            >
              <div 
                class="p-4 rounded-lg flex items-center"
                :class="isError ? 'bg-red-100 text-red-700' : 'themed-bg-primary-light themed-text-primary'"
              >
                <span x-text="isError ? '⚠️' : 'ℹ️'" class="mr-2"></span>
                <span x-text="message"></span>
              </div>
            </div>
          </div>
        </div>
        
        <!-- 底部版权信息 -->
        <div class="text-center mt-6 text-white/70">
          <small>&copy; 2026 天工平台</small>
        </div>
      </div>
    </div>
  </div>

  <!-- 页面专属逻辑 -->
  <!-- 页面底部 - 可用于全局脚本或版权信息 -->




</body>
</html>
