<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="/admin/favicon.svg">
<title>寄卖管理 - 管理后台</title>
<style>[x-cloak] { display: none !important; }</style>

<style>[x-cloak] { display: none !important; }</style>



  <script type="module" crossorigin src="/admin/assets/consignment-management-BLY6RXA8.js"></script>
  <link rel="modulepreload" crossorigin href="/admin/assets/alpine-DHMHVPoE.js">
  <link rel="modulepreload" crossorigin href="/admin/assets/vendor-z_UyD9yt.js">
  <link rel="modulepreload" crossorigin href="/admin/assets/echarts-DsXiNbrD.js">
  <link rel="modulepreload" crossorigin href="/admin/assets/vendor-socketio-DdI-Egwi.js">
  <link rel="modulepreload" crossorigin href="/admin/assets/index-C5xulW0E.js">
  <link rel="modulepreload" crossorigin href="/admin/assets/main-Crfp49js.js">
  <link rel="modulepreload" crossorigin href="/admin/assets/index-BLe2DV9Q.js">
  <link rel="stylesheet" crossorigin href="/admin/assets/index-ClYS6XHm.css">
</head>
<body class="themed-bg-subtle min-h-screen">
  <nav class="bg-gray-800 text-white shadow-lg">
    <div class="container mx-auto px-4 py-3 flex justify-between items-center">
      <div class="flex items-center space-x-4">
        <a href="/admin/workspace.html" class="hover:text-gray-300 transition-colors">← 返回工作台</a>
        <span class="text-lg font-semibold">♻️ 寄卖管理</span>
      </div>
      <div class="flex items-center space-x-4">
        <span x-data x-text="$store.auth?.user?.nickname ? `欢迎，${$store.auth.user.nickname}` : '欢迎，管理员'" class="text-sm text-gray-300">欢迎，管理员</span>
      </div>
    </div>
  </nav>

  <div class="container mx-auto px-4 py-6" x-data="consignmentManagement()" x-cloak>
    <div class="themed-card rounded-xl shadow-sm mb-6 overflow-hidden">
      <div class="px-5 py-4 bg-gradient-to-r from-slate-50 to-white border-b themed-border">
        <div class="flex flex-wrap gap-4 items-end">
          <div class="flex-1 min-w-[160px]">
            <label class="block text-xs font-medium themed-text-muted mb-1.5">单号搜索</label>
            <input type="text" x-model="filters.keyword" @keyup.enter="handleSearch()" placeholder="order_no" class="w-full px-3 py-2 text-sm border rounded-lg themed-border focus:ring-2 focus:ring-cyan-500">
          </div>
          <div class="w-40">
            <label class="block text-xs font-medium themed-text-muted mb-1.5">consignor_account_id</label>
            <input type="number" x-model="filters.consignor_account_id" @change="handleSearch()" class="w-full px-3 py-2 text-sm border rounded-lg themed-border">
          </div>
          <div class="w-32">
            <label class="block text-xs font-medium themed-text-muted mb-1.5">status</label>
            <select x-model="filters.status" @change="handleSearch()" class="w-full px-3 py-2 text-sm border rounded-lg themed-border">
              <option value="">全部</option>
              <option value="pending">待审核</option>
              <option value="listed">已上架</option>
              <option value="sold">已售出</option>
              <option value="withdrawn">已撤回</option>
              <option value="rejected">已驳回</option>
            </select>
          </div>
          <div class="flex gap-2">
            <button @click="handleSearch()" class="px-4 py-2 text-sm themed-bg-primary text-white rounded-lg">🔍 搜索</button>
            <button @click="resetFilters()" class="px-4 py-2 text-sm border rounded-lg themed-border hover:bg-gray-50">🔄 重置</button>
            <button @click="openCreateForm()" class="px-4 py-2 text-sm themed-gradient-primary text-white rounded-lg">➕ 新建寄卖单</button>
          </div>
        </div>
      </div>
    </div>

    <div class="themed-card rounded-xl shadow-sm border overflow-hidden">
      <div class="px-5 py-3 bg-gradient-to-r from-slate-50 to-white border-b themed-border flex items-center gap-2">
        <span class="text-sm font-semibold themed-text">寄卖单列表</span>
        <span class="px-2 py-0.5 text-xs font-medium bg-cyan-100 text-cyan-600 rounded-full" x-text="total + ' 条'"></span>
      </div>
      <div x-show="loading" class="p-12 text-center"><div class="animate-spin text-3xl mb-3">⏳</div><p class="text-sm">加载中...</p></div>
      <div x-show="!loading && items.length === 0" class="p-12 text-center">
        <p class="text-lg font-medium themed-text mb-2">暂无寄卖单</p>
        <button @click="openCreateForm()" class="px-4 py-2 text-sm themed-gradient-primary text-white rounded-lg">➕ 新建寄卖单</button>
      </div>
      <table x-show="!loading && items.length > 0" class="w-full text-sm">
        <thead>
          <tr class="bg-gradient-to-r from-slate-50 to-gray-50 border-b themed-border">
            <th class="px-4 py-3 text-left text-xs font-semibold themed-text-muted">consignment_id</th>
            <th class="px-4 py-3 text-left text-xs font-semibold themed-text-muted">order_no</th>
            <th class="px-4 py-3 text-left text-xs font-semibold themed-text-muted">物品</th>
            <th class="px-4 py-3 text-right text-xs font-semibold themed-text-muted">list_price</th>
            <th class="px-4 py-3 text-center text-xs font-semibold themed-text-muted">status</th>
            <th class="px-4 py-3 text-left text-xs font-semibold themed-text-muted">创建时间</th>
            <th class="px-4 py-3 text-center text-xs font-semibold themed-text-muted">操作</th>
          </tr>
        </thead>
        <tbody class="divide-y themed-border">
          <template x-for="row in items" :key="row.consignment_id">
            <tr class="hover:bg-cyan-50/30">
              <td class="px-4 py-3 font-mono text-xs" x-text="'#' + row.consignment_id"></td>
              <td class="px-4 py-3 font-mono font-medium" x-text="row.order_no"></td>
              <td class="px-4 py-3" x-text="row.item?.item_name || row.item_id"></td>
              <td class="px-4 py-3 text-right" x-text="row.list_price != null ? row.list_price + ' ' + (row.list_asset_code || '') : '-'"></td>
              <td class="px-4 py-3 text-center">
                <span class="px-2 py-0.5 rounded-full text-xs font-medium" :class="statusClass(row.status)" x-text="statusLabel(row.status)"></span>
              </td>
              <td class="px-4 py-3 text-xs themed-text-muted" x-text="formatDate(row.created_at)"></td>
              <td class="px-4 py-3">
                <div class="flex justify-center gap-1 flex-wrap">
                  <button @click="viewDetail(row.consignment_id)" class="px-2 py-1 text-xs text-blue-600 hover:bg-blue-50 rounded">详情</button>
                  <button x-show="row.status === 'pending'" @click="doAction('list', row.consignment_id, '上架')" class="px-2 py-1 text-xs text-indigo-600 hover:bg-indigo-50 rounded">上架</button>
                  <button x-show="row.status === 'listed'" @click="doAction('sold', row.consignment_id, '标记售出')" class="px-2 py-1 text-xs text-green-600 hover:bg-green-50 rounded">售出</button>
                  <button x-show="row.status === 'listed'" @click="doAction('withdraw', row.consignment_id, '撤回')" class="px-2 py-1 text-xs text-gray-600 hover:bg-gray-50 rounded">撤回</button>
                  <button x-show="row.status === 'pending'" @click="doAction('reject', row.consignment_id, '驳回')" class="px-2 py-1 text-xs text-red-600 hover:bg-red-50 rounded">驳回</button>
                </div>
              </td>
            </tr>
          </template>
        </tbody>
      </table>
      <div x-show="total > 0" class="px-5 py-3 flex justify-between items-center bg-gradient-to-r from-slate-50 to-gray-50 border-t themed-border">
        <span class="text-xs themed-text-muted">共 <span x-text="total"></span> 条，第 <span x-text="pagination.page"></span>/<span x-text="totalPages"></span> 页</span>
        <div class="flex gap-1">
          <button @click="goToPage(pagination.page - 1)" :disabled="!hasPrevPage" class="px-3 py-1.5 border rounded-lg text-xs themed-border" :class="hasPrevPage ? '' : 'opacity-40'">← 上一页</button>
          <button @click="goToPage(pagination.page + 1)" :disabled="!hasNextPage" class="px-3 py-1.5 border rounded-lg text-xs themed-border" :class="hasNextPage ? '' : 'opacity-40'">下一页 →</button>
        </div>
      </div>
    </div>

    <div x-show="show_form" class="fixed inset-0 z-50 flex items-center justify-center" x-cloak>
      <div class="absolute inset-0 bg-black/50" @click="closeForm()"></div>
      <div class="relative themed-card rounded-2xl shadow-2xl w-full max-w-lg mx-4 border themed-border">
        <div class="px-6 py-4 themed-gradient-primary rounded-t-2xl flex justify-between">
          <h3 class="text-lg font-bold text-white">➕ 新建寄卖单</h3>
          <button @click="closeForm()" class="text-white/80 hover:text-white text-xl">&times;</button>
        </div>
        <form @submit.prevent="submitForm()" class="px-6 py-5 space-y-4">
          <div><label class="block text-xs font-semibold mb-1.5">item_id <span class="text-red-500">*</span></label><input type="number" x-model="form.item_id" required class="w-full px-3 py-2 text-sm border rounded-lg themed-border"></div>
          <div><label class="block text-xs font-semibold mb-1.5">consignor_account_id <span class="text-red-500">*</span></label><input type="number" x-model="form.consignor_account_id" required class="w-full px-3 py-2 text-sm border rounded-lg themed-border"></div>
          <div class="grid grid-cols-2 gap-4">
            <div><label class="block text-xs font-semibold mb-1.5">list_price</label><input type="number" step="0.01" x-model="form.list_price" class="w-full px-3 py-2 text-sm border rounded-lg themed-border"></div>
            <div><label class="block text-xs font-semibold mb-1.5">list_asset_code</label><input type="text" x-model="form.list_asset_code" class="w-full px-3 py-2 text-sm border rounded-lg themed-border"></div>
          </div>
          <div><label class="block text-xs font-semibold mb-1.5">relist_item_id</label><input type="number" x-model="form.relist_item_id" class="w-full px-3 py-2 text-sm border rounded-lg themed-border"></div>
          <div class="flex justify-end gap-3 pt-3 border-t themed-border">
            <button type="button" @click="closeForm()" class="px-5 py-2.5 text-sm border rounded-lg themed-border">取消</button>
            <button type="submit" :disabled="saving" class="px-5 py-2.5 text-sm themed-gradient-primary text-white rounded-lg disabled:opacity-50">✅ 创建</button>
          </div>
        </form>
      </div>
    </div>

    <div x-show="show_detail" class="fixed inset-0 z-50 flex items-center justify-center" x-cloak>
      <div class="absolute inset-0 bg-black/50" @click="show_detail = false"></div>
      <div class="relative themed-card rounded-2xl shadow-2xl w-full max-w-lg mx-4 border themed-border">
        <div class="px-6 py-4 bg-gradient-to-r from-slate-700 to-slate-800 rounded-t-2xl flex justify-between">
          <h3 class="text-lg font-bold text-white">📋 寄卖单详情</h3>
          <button @click="show_detail = false" class="text-white/80 hover:text-white text-xl">&times;</button>
        </div>
        <div x-show="detail" class="px-6 py-5 space-y-2 text-sm">
          <p><span class="font-semibold">order_no：</span><span class="font-mono" x-text="detail?.order_no"></span></p>
          <p><span class="font-semibold">status：</span><span x-text="statusLabel(detail?.status)"></span></p>
          <p><span class="font-semibold">item_id：</span><span x-text="detail?.item_id"></span> — <span x-text="detail?.item?.item_name"></span></p>
          <p><span class="font-semibold">consignor_account_id：</span><span x-text="detail?.consignor_account_id"></span></p>
          <p><span class="font-semibold">list_price：</span><span x-text="detail?.list_price != null ? detail.list_price + ' ' + (detail.list_asset_code || '') : '-'"></span></p>
          <p class="text-orange-700 font-semibold"><span class="font-semibold">max_list_price：</span><span x-text="detail?.max_list_price != null ? detail.max_list_price : '无上限'"></span></p>
          <p><span class="font-semibold">relist_item_id：</span><span x-text="detail?.relist_item_id || '-'"></span></p>
        </div>
        <div class="px-6 py-3 border-t themed-border flex justify-end">
          <button @click="show_detail = false" class="px-4 py-2 text-sm border rounded-lg themed-border">关闭</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 页面底部 - 可用于全局脚本或版权信息 -->


</body>
</html>
