  <link rel="modulepreload" crossorigin href="/admin/assets/vendor-z_UyD9yt.js">
  <link rel="modulepreload" crossorigin href="/admin/assets/echarts-DsXiNbrD.js">

  <link rel="modulepreload" crossorigin href="/admin/assets/main-Crfp49js.js">

<body class="themed-bg-subtle min-h-screen" x-data="assetsPortfolioPage()" x-init="init()" x-cloak>
  
  <!-- 导航栏（深色渐变风格） -->
  <nav class="page-navbar">
    <div class="container mx-auto px-4 py-3 flex justify-between items-center">
      <div class="flex items-center space-x-4">
        <a href="/admin/workspace.html" class="text-blue-200 hover:text-white transition-colors">← 返回工作台</a>
        <span class="text-lg font-semibold">💼 资产组合</span>
      </div>
      <div class="flex items-center space-x-4">
        <span x-text="'欢迎，' + (current_user?.nickname || '管理员')"></span>
        <button @click="logout()" class="px-3 py-1 border border-white/30 rounded hover:bg-white/10 transition-colors">退出登录</button>
      </div>
    </div>
  </nav>

  <div class="container mx-auto px-4 py-6">
    <!-- 页面横幅 -->
    <div class="page-banner mb-6">
      <h1>💼 资产组合总览</h1>
      <p>系统资产流通、持有分布、交易趋势全景视图</p>
    </div>
    <!-- 总览卡片 -->
    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
      <div class="bg-gradient-to-br from-emerald-500 to-teal-600 rounded-xl shadow-lg p-5 text-white overflow-hidden">
        <div class="flex items-center justify-between">
          <div>
            <p class="text-emerald-100 text-sm">资产总流通量</p>
            <p class="text-2xl font-bold mt-1 truncate" x-text="formatCurrency(overview.total_circulation)" :title="overview.total_circulation">0</p>
          </div>
          <div class="w-12 h-12 bg-white/20 rounded-xl flex items-center justify-center text-2xl">💰</div>
        </div>
      </div>
      <div class="bg-gradient-to-br from-blue-500 to-indigo-600 rounded-xl shadow-lg p-5 text-white overflow-hidden">
        <div class="flex items-center justify-between">
          <div>
            <p class="text-blue-100 text-sm">持有用户</p>
            <p class="text-3xl font-bold mt-1" x-text="overview.total_holders">0</p>
          </div>
          <div class="w-12 h-12 bg-white/20 rounded-xl flex items-center justify-center text-2xl">👥</div>
        </div>
      </div>
      <div class="bg-gradient-to-br from-purple-500 to-violet-600 rounded-xl shadow-lg p-5 text-white overflow-hidden">
        <div class="flex items-center justify-between">
          <div>
            <p class="text-purple-100 text-sm">资产种类</p>
            <p class="text-3xl font-bold mt-1" x-text="overview.total_asset_types">0</p>
          </div>
          <div class="w-12 h-12 bg-white/20 rounded-xl flex items-center justify-center text-2xl">📦</div>
        </div>
      </div>
      <div class="bg-gradient-to-br from-orange-500 to-amber-600 rounded-xl shadow-lg p-5 text-white overflow-hidden">
        <div class="flex items-center justify-between">
          <div>
            <p class="text-orange-100 text-sm">增长率</p>
            <p class="text-3xl font-bold mt-1" x-text="formatPercentage(overview.growth_rate)">0%</p>
          </div>
          <div class="w-12 h-12 bg-white/20 rounded-xl flex items-center justify-center text-2xl">📈</div>
        </div>
      </div>
    </div>

    <!-- 图表区域 -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
      <div class="themed-card rounded-lg shadow">
        <div class="p-4 border-b">
          <h5 class="font-semibold">资产类型分布</h5>
        </div>
        <div class="p-4">
          <div id="assetTypeChart" class="chart-container"></div>
        </div>
      </div>
      <div class="themed-card rounded-lg shadow">
        <div class="p-4 border-b">
          <h5 class="font-semibold">资产价值趋势</h5>
        </div>
        <div class="p-4">
          <div id="valueTrendChart" class="chart-container"></div>
        </div>
      </div>
    </div>

    <!-- 用户资产查询 -->
    <div class="themed-card rounded-lg shadow mb-6">
      <div class="p-4 border-b">
        <h5 class="font-semibold">用户资产查询</h5>
      </div>
      <div class="p-4">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
          <div>
            <label class="block text-sm font-medium themed-text-secondary mb-1">手机号</label>
            <input type="text" x-model="searchForm.mobile" maxlength="11" class="w-full px-3 py-2 border rounded-lg" placeholder="输入手机号">
            <div x-show="resolvedUser" class="mt-1 text-xs text-green-600">✅ <span x-text="resolvedUser?.nickname"></span> (<span x-text="resolvedUser?.mobile"></span>)</div>
            <div x-show="resolveError" class="mt-1 text-xs text-red-500" x-text="resolveError"></div>
          </div>
          <div>
            <label class="block text-sm font-medium themed-text-secondary mb-1">资产类型</label>
            <select x-model="searchForm.asset_type" class="w-full px-3 py-2 border rounded-lg">
              <option value="">全部</option>
              <template x-for="(type, idx) in assetTypes" :key="type.asset_code + '_' + idx">
                <option :value="type.asset_code" x-text="type.display_name || type.name || type.asset_code"></option>
              </template>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium themed-text-secondary mb-1">最低价值</label>
            <input type="number" x-model.number="searchForm.min_value" class="w-full px-3 py-2 border rounded-lg" placeholder="最低价值">
          </div>
          <div>
            <button @click="searchAssets()" class="w-full px-4 py-2 themed-btn-primary rounded-lg">
              🔍 查询
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- 资产列表（data-table） -->
    <div class="themed-card rounded-lg shadow" @table-action="handleAssetsTableAction($event.detail)">
      <div class="p-4 border-b">
        <h5 class="font-semibold">资产明细</h5>
      </div>
      <div x-data="dataTable({
        columns: assetsTableColumns,
        dataSource: fetchAssetsTableData,
        primaryKey: 'asset_id',
        sortable: true,
        selectable: false,
        exportable: true,
        page_size: 50,
        emptyText: '请输入手机号后点击查询'
      })" x-init="init()" @dt-assets-refresh.window="search()">
        <!-- 标准数据表格组件模板（data-table EJS partial）- 配合 Alpine.js dataTable 组件使用 -->
<!-- ===== 工具栏 ===== -->
<div class="flex justify-between items-center mb-3">
  <div class="flex items-center gap-3">
    <!-- 选择信息（#13） -->
    <template x-if="selectable && selectedRows.length > 0">
      <div class="flex items-center gap-2 text-sm themed-text-primary themed-bg-primary-light px-3 py-1.5 rounded-lg">
        <span>已选 <strong x-text="selectedRows.length"></strong> 项</span>
        <button @click="clearSelection()" class="themed-text-primary hover:underline text-xs underline">取消选择</button>
      </div>
    </template>
    <!-- 上次更新时间（#2） -->
    <template x-if="lastUpdateTime">
      <span class="text-xs text-gray-400">最后更新: <span x-text="lastUpdateTime"></span></span>
    </template>
  </div>
  <div class="flex items-center gap-2">
    <!-- 导出按钮（#12） -->
    <template x-if="exportable">
      <button @click="openExport()" class="px-3 py-1.5 text-sm border border-gray-300 rounded-lg hover:bg-gray-50 flex items-center gap-1">
        📥 <span>导出</span>
      </button>
    </template>
    <!-- 刷新按钮 -->
    <button @click="refresh()" :disabled="loading" class="px-3 py-1.5 text-sm border border-gray-300 rounded-lg hover:bg-gray-50 flex items-center gap-1 disabled:opacity-50">
      🔄 <span>刷新</span>
    </button>
  </div>
</div>

<!-- ===== 表格 ===== -->
<div class="overflow-x-auto themed-card rounded-lg shadow">
  <table class="w-full">
    <!-- 表头 -->
    <thead class="themed-bg-muted">
      <tr>
        <!-- 选择列（#13） -->
        <template x-if="selectable">
          <th class="px-4 py-3 text-center w-12">
            <input type="checkbox"
              :checked="isAllSelected"
              :indeterminate.prop="isPartialSelected"
              @change="toggleSelectAll($event.target.checked)"
              class="rounded border-gray-300">
          </th>
        </template>
        <!-- 数据列（#10 排序） -->
        <template x-for="(col, colIdx) in columns" :key="'th_' + colIdx">
          <th class="px-4 py-3 text-left text-sm font-medium themed-text-secondary"
            :class="{ 'cursor-pointer themed-th-sortable select-none': sortable && col.sortable }"
            :style="col.width ? 'width:' + col.width : ''"
            @click="sort(col)">
            <div class="flex items-center gap-1">
              <span x-text="col.label"></span>
              <template x-if="sortable && col.sortable">
                <span class="text-xs" :class="sortColumn === col.key ? 'themed-text-primary font-bold' : 'text-gray-400'" x-text="getSortIcon(col)"></span>
              </template>
            </div>
          </th>
        </template>
      </tr>
    </thead>
    <!-- 状态行（加载/错误/空）独立 tbody，避免与 x-for 在同一 tbody 导致 Alpine.js DOM 引用丢失 -->
    <tbody x-show="loading || hasError || isEmpty" class="divide-y themed-divide">
      <!-- 加载状态 -->
      <tr x-show="loading">
        <td :colspan="colSpan" class="px-4 py-12 text-center">
          <div class="flex flex-col items-center gap-2">
            <div class="animate-spin w-8 h-8 border-4 themed-border-primary border-t-transparent rounded-full"></div>
            <span class="text-sm themed-text-muted">加载中...</span>
          </div>
        </td>
      </tr>
      <!-- 错误状态（#5） -->
      <tr x-show="hasError">
        <td :colspan="colSpan" class="px-4 py-12 text-center">
          <div class="flex flex-col items-center gap-3">
            <span class="text-4xl">❌</span>
            <div class="text-red-600 font-medium">加载失败</div>
            <div class="text-sm text-gray-500" x-text="error"></div>
            <button @click="loadData()" class="px-4 py-2 themed-bg-primary text-white rounded-lg text-sm">🔄 重试</button>
          </div>
        </td>
      </tr>
      <!-- 空状态 -->
      <tr x-show="isEmpty">
        <td :colspan="colSpan" class="px-4 py-12 text-center">
          <div class="flex flex-col items-center gap-2">
            <span class="text-4xl">📭</span>
            <div class="themed-text-muted" x-text="emptyText"></div>
          </div>
        </td>
      </tr>
    </tbody>
    <!-- 数据行独立 tbody，x-for 是唯一模板，避免 Alpine.js x-for + x-if 嵌套 DOM 引用 bug -->
    <tbody x-show="hasData" class="divide-y themed-divide">
      <template x-for="(row, rowIndex) in data" :key="String(row[primaryKey] || '') + '_' + rowIndex">
        <tr class="themed-hover-bg transition-colors" @click="handleRowClick(row, rowIndex)">
          <!-- 选择列 -->
          <template x-if="selectable">
            <td class="px-4 py-3 text-center" @click.stop>
              <input type="checkbox"
                :checked="isSelected(row[primaryKey])"
                @change="toggleSelect(row[primaryKey])"
                class="rounded border-gray-300">
            </td>
          </template>
          <!-- 数据列 -->
          <template x-for="(col, colIdx) in columns" :key="'td_' + rowIndex + '_' + colIdx">
            <td class="px-4 py-3 text-sm" :class="col.type === 'actions' ? '' : 'themed-text-primary'">
              <!-- 普通列：使用 renderCell -->
              <span x-show="col.type !== 'actions'" x-html="renderCell(row, col)"></span>
              <!-- 操作列：使用 Alpine 指令（支持 @click） -->
              <div x-show="col.type === 'actions'" class="flex items-center gap-1" @click.stop>
                <template x-for="action in (col.actions || [])" :key="action.name">
                  <button
                    x-show="!action.condition || action.condition(row)"
                    @click="$dispatch('table-action', { action: action.name, row: JSON.parse(JSON.stringify(row)) })"
                    class="px-2 py-1 text-xs rounded hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors whitespace-nowrap"
                    :class="action.class || 'themed-text-primary'"
                    x-html="(action.icon ? action.icon + ' ' : '') + (typeof action.label === 'function' ? action.label(row) : action.label)">
                  </button>
                </template>
              </div>
            </td>
          </template>
        </tr>
      </template>
    </tbody>
  </table>

  <!-- ===== 分页栏（#4 统一分页） ===== -->
  <template x-if="total_records > 0">
    <div class="px-4 py-3 border-t themed-divide flex justify-between items-center">
      <span class="text-sm themed-text-muted" x-text="paginationInfo"></span>
      <div class="flex items-center gap-1">
        <!-- 首页 -->
        <button @click="firstPage()" :disabled="!hasPrevPage"
          class="px-2 py-1 text-sm border rounded hover:bg-gray-50 disabled:opacity-40 disabled:cursor-not-allowed">«</button>
        <!-- 上一页 -->
        <button @click="prevPage()" :disabled="!hasPrevPage"
          class="px-2 py-1 text-sm border rounded hover:bg-gray-50 disabled:opacity-40 disabled:cursor-not-allowed">‹</button>
        <!-- 页码 -->
        <template x-for="page in visiblePages" :key="'p_' + page">
          <button @click="goToPage(page)"
            :disabled="page === '...'"
            :class="page === current_page ? 'themed-bg-primary text-white themed-border-primary' : 'hover:bg-gray-50'"
            class="px-3 py-1 text-sm border rounded min-w-[32px]"
            x-text="page"></button>
        </template>
        <!-- 下一页 -->
        <button @click="nextPage()" :disabled="!hasNextPage"
          class="px-2 py-1 text-sm border rounded hover:bg-gray-50 disabled:opacity-40 disabled:cursor-not-allowed">›</button>
        <!-- 末页 -->
        <button @click="lastPage()" :disabled="!hasNextPage"
          class="px-2 py-1 text-sm border rounded hover:bg-gray-50 disabled:opacity-40 disabled:cursor-not-allowed">»</button>
      </div>
    </div>
  </template>
</div>


      </div>
    </div>
  </div>

  <!-- 资产详情模态框 -->
  <div x-show="selectedAsset" x-cloak class="fixed inset-0 z-50 flex items-center justify-center bg-black/50" @click.self="selectedAsset = null">
    <div class="themed-card rounded-lg shadow-xl w-full max-w-lg mx-4">
      <div class="p-4 border-b">
        <h5 class="font-semibold">资产详情</h5>
      </div>
      <div class="p-4 space-y-3">
        <div class="flex justify-between"><span class="themed-text-muted">资产ID:</span><span class="font-mono" x-text="selectedAsset?.asset_id"></span></div>
        <div class="flex justify-between"><span class="themed-text-muted">用户:</span><span x-text="selectedAsset?.user_nickname || selectedAsset?.user_id"></span></div>
        <div class="flex justify-between"><span class="themed-text-muted">资产类型:</span><span x-text="selectedAsset?.asset_type_display || selectedAsset?.asset_type"></span></div>
        <div class="flex justify-between"><span class="themed-text-muted">资产名称:</span><span x-text="selectedAsset?.asset_name"></span></div>
        <div class="flex justify-between"><span class="themed-text-muted">数量:</span><span class="font-mono" x-text="formatNumber(selectedAsset?.quantity)"></span></div>
        <div class="flex justify-between"><span class="themed-text-muted">单价:</span><span class="font-mono" x-text="formatCurrency(selectedAsset?.unit_price)"></span></div>
        <div class="flex justify-between"><span class="themed-text-muted">总价值:</span><span class="font-mono text-emerald-600 font-medium" x-text="formatCurrency(selectedAsset?.total_value)"></span></div>
        <div class="flex justify-between"><span class="themed-text-muted">创建时间:</span><span x-text="formatDate(selectedAsset?.created_at)"></span></div>
        <div class="flex justify-between"><span class="themed-text-muted">更新时间:</span><span x-text="formatDate(selectedAsset?.updated_at)"></span></div>
      </div>
      <div class="p-4 border-t flex justify-end">
        <button @click="selectedAsset = null" class="px-4 py-2 bg-gray-500 text-white rounded hover:bg-gray-600">关闭</button>
      </div>
    </div>
  </div>

  <!-- 资产历史模态框 -->
  <div x-show="showHistoryModal" x-cloak class="fixed inset-0 z-50 flex items-center justify-center bg-black/50" @click.self="closeHistoryModal()">
    <div class="themed-card rounded-lg shadow-xl w-full max-w-2xl mx-4 max-h-[80vh] flex flex-col">
      <div class="p-4 border-b flex justify-between items-center">
        <h5 class="font-semibold">
          <span x-text="historyAsset?.asset_name"></span> - 交易历史
        </h5>
        <button @click="closeHistoryModal()" class="text-gray-400 hover:themed-text-muted">&times;</button>
      </div>
      <div class="p-4 overflow-y-auto flex-1">
        <!-- 加载中 -->
        <div x-show="historyLoading" class="text-center py-8">
          <span class="themed-text-muted">加载中...</span>
        </div>
        <!-- 历史记录表格 -->
        <div x-show="!historyLoading && assetHistory.length > 0">
          <table class="w-full text-sm">
            <thead class="themed-bg-base">
              <tr>
                <th class="px-3 py-2 text-left">交易类型</th>
                <th class="px-3 py-2 text-right">变动</th>
                <th class="px-3 py-2 text-right">余额</th>
                <th class="px-3 py-2 text-left">时间</th>
              </tr>
            </thead>
            <tbody class="divide-y">
              <template x-for="tx in assetHistory" :key="tx.asset_transaction_id">
                <tr class="themed-hover-bg">
                  <td class="px-3 py-2" x-text="tx.business_type_display || tx.business_type || '-'"></td>
                  <td class="px-3 py-2 text-right font-mono" :class="tx.amount >= 0 ? 'text-green-600' : 'text-red-600'" x-text="(tx.amount >= 0 ? '+' : '') + tx.amount"></td>
                  <td class="px-3 py-2 text-right font-mono themed-text-muted" x-text="tx.balance_before + ' → ' + tx.balance_after"></td>
                  <td class="px-3 py-2 themed-text-muted" x-text="tx.created_at"></td>
                </tr>
              </template>
            </tbody>
          </table>
        </div>
        <!-- 无记录 -->
        <div x-show="!historyLoading && assetHistory.length === 0" class="text-center py-8 themed-text-muted">
          暂无交易记录
        </div>
      </div>
      <div class="p-4 border-t flex justify-end">
        <button @click="closeHistoryModal()" class="px-4 py-2 bg-gray-500 text-white rounded hover:bg-gray-600">关闭</button>
      </div>
    </div>
  </div>

  <!-- 页面底部 - 可用于全局脚本或版权信息 -->



</body>
</html>
