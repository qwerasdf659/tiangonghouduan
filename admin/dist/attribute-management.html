<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="/admin/favicon.svg">
<title>属性管理 - 管理后台</title>
<style>[x-cloak] { display: none !important; }</style>

<style>[x-cloak] { display: none !important; }</style>



  <script type="module" crossorigin src="/admin/assets/attribute-management-BOI-wtz7.js"></script>
  <link rel="modulepreload" crossorigin href="/admin/assets/alpine-DHMHVPoE.js">
  <link rel="modulepreload" crossorigin href="/admin/assets/vendor-z_UyD9yt.js">
  <link rel="modulepreload" crossorigin href="/admin/assets/echarts-DsXiNbrD.js">
  <link rel="modulepreload" crossorigin href="/admin/assets/vendor-socketio-DdI-Egwi.js">
  <link rel="modulepreload" crossorigin href="/admin/assets/index-Bl7IvXqV.js">
  <link rel="modulepreload" crossorigin href="/admin/assets/main-Cbt3wNkY.js">
  <link rel="stylesheet" crossorigin href="/admin/assets/index-Cdcizjov.css">
</head>
<body class="themed-bg-subtle min-h-screen">

  <nav class="page-navbar">
    <div class="container mx-auto px-4 py-3 flex justify-between items-center">
      <div class="flex items-center space-x-4">
        <a href="/admin/workspace.html" class="text-blue-200 hover:text-white transition-colors">← 返回工作台</a>
        <span class="text-lg font-semibold">🏷️ 属性管理</span>
      </div>
    </div>
  </nav>

  <div class="container mx-auto px-4 py-6"
       x-data="attributeManagement()"
       x-init="init()"
       @table-action="handleTableAction($event.detail)">

    <div x-cloak class="space-y-6">

      <div class="page-banner mb-2">
        <h1>🏷️ 统一商品中心 · EAV 属性</h1>
        <p>定义属性字段、销售/搜索标记，并维护下拉选项（适用于 select 类型）</p>
      </div>

      <div class="themed-card rounded-xl border p-4 flex flex-wrap gap-4 items-end">
        <div>
          <label class="block text-xs font-medium text-gray-500 mb-1">销售属性</label>
          <select x-model="attrFilters.is_sale_attr" @change="onAttrFilterChange()" class="px-3 py-2 border rounded-lg text-sm min-w-[140px]">
            <option value="">全部</option>
            <option value="true">是</option>
            <option value="false">否</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-medium text-gray-500 mb-1">可搜索</label>
          <select x-model="attrFilters.is_searchable" @change="onAttrFilterChange()" class="px-3 py-2 border rounded-lg text-sm min-w-[140px]">
            <option value="">全部</option>
            <option value="true">是</option>
            <option value="false">否</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-medium text-gray-500 mb-1">启用状态</label>
          <select x-model="attrFilters.is_enabled" @change="onAttrFilterChange()" class="px-3 py-2 border rounded-lg text-sm min-w-[140px]">
            <option value="">全部</option>
            <option value="true">启用</option>
            <option value="false">禁用</option>
          </select>
        </div>
        <button type="button" @click="openCreateAttribute()" class="action-btn action-btn-primary ml-auto">
          ➕ 新增属性
        </button>
      </div>

      <div x-data="makeAttrTable()" x-init="init()" @dt-refresh.window="refresh()">
        <!-- 标准数据表格组件模板（data-table EJS partial）- 配合 Alpine.js dataTable 组件使用 -->
<!-- ===== 工具栏 ===== -->
<div class="flex justify-between items-center mb-3">
  <div class="flex items-center gap-3">
    <!-- 选择信息（#13） -->
    <template x-if="selectable && selectedRows.length > 0">
      <div class="flex items-center gap-2 text-sm themed-text-primary themed-bg-primary-light px-3 py-1.5 rounded-lg">
        <span>已选 <strong x-text="selectedRows.length"></strong> 项</span>
        <button @click="clearSelection()" class="themed-text-primary hover:underline text-xs underline">取消选择</button>
      </div>
    </template>
    <!-- 上次更新时间（#2） -->
    <template x-if="lastUpdateTime">
      <span class="text-xs text-gray-400">最后更新: <span x-text="lastUpdateTime"></span></span>
    </template>
  </div>
  <div class="flex items-center gap-2">
    <!-- 导出按钮（#12） -->
    <template x-if="exportable">
      <button @click="openExport()" class="px-3 py-1.5 text-sm border border-gray-300 rounded-lg hover:bg-gray-50 flex items-center gap-1">
        📥 <span>导出</span>
      </button>
    </template>
    <!-- 刷新按钮 -->
    <button @click="refresh()" :disabled="loading" class="px-3 py-1.5 text-sm border border-gray-300 rounded-lg hover:bg-gray-50 flex items-center gap-1 disabled:opacity-50">
      🔄 <span>刷新</span>
    </button>
  </div>
</div>

<!-- ===== 表格 ===== -->
<div class="overflow-x-auto themed-card rounded-lg shadow">
  <table class="w-full">
    <!-- 表头 -->
    <thead class="themed-bg-muted">
      <tr>
        <!-- 选择列（#13） -->
        <template x-if="selectable">
          <th class="px-4 py-3 text-center w-12">
            <input type="checkbox"
              :checked="isAllSelected"
              :indeterminate.prop="isPartialSelected"
              @change="toggleSelectAll($event.target.checked)"
              class="rounded border-gray-300">
          </th>
        </template>
        <!-- 数据列（#10 排序） -->
        <template x-for="(col, colIdx) in columns" :key="'th_' + colIdx">
          <th class="px-4 py-3 text-left text-sm font-medium themed-text-secondary"
            :class="{ 'cursor-pointer themed-th-sortable select-none': sortable && col.sortable }"
            :style="col.width ? 'width:' + col.width : ''"
            @click="sort(col)">
            <div class="flex items-center gap-1">
              <span x-text="col.label"></span>
              <template x-if="sortable && col.sortable">
                <span class="text-xs" :class="sortColumn === col.key ? 'themed-text-primary font-bold' : 'text-gray-400'" x-text="getSortIcon(col)"></span>
              </template>
            </div>
          </th>
        </template>
      </tr>
    </thead>
    <!-- 状态行（加载/错误/空）独立 tbody，避免与 x-for 在同一 tbody 导致 Alpine.js DOM 引用丢失 -->
    <tbody x-show="loading || hasError || isEmpty" class="divide-y themed-divide">
      <!-- 加载状态 -->
      <tr x-show="loading">
        <td :colspan="colSpan" class="px-4 py-12 text-center">
          <div class="flex flex-col items-center gap-2">
            <div class="animate-spin w-8 h-8 border-4 themed-border-primary border-t-transparent rounded-full"></div>
            <span class="text-sm themed-text-muted">加载中...</span>
          </div>
        </td>
      </tr>
      <!-- 错误状态（#5） -->
      <tr x-show="hasError">
        <td :colspan="colSpan" class="px-4 py-12 text-center">
          <div class="flex flex-col items-center gap-3">
            <span class="text-4xl">❌</span>
            <div class="text-red-600 font-medium">加载失败</div>
            <div class="text-sm text-gray-500" x-text="error"></div>
            <button @click="loadData()" class="px-4 py-2 themed-bg-primary text-white rounded-lg text-sm">🔄 重试</button>
          </div>
        </td>
      </tr>
      <!-- 空状态 -->
      <tr x-show="isEmpty">
        <td :colspan="colSpan" class="px-4 py-12 text-center">
          <div class="flex flex-col items-center gap-2">
            <span class="text-4xl">📭</span>
            <div class="themed-text-muted" x-text="emptyText"></div>
          </div>
        </td>
      </tr>
    </tbody>
    <!-- 数据行独立 tbody，x-for 是唯一模板，避免 Alpine.js x-for + x-if 嵌套 DOM 引用 bug -->
    <tbody x-show="hasData" class="divide-y themed-divide">
      <template x-for="(row, rowIndex) in data" :key="String(row[primaryKey] || '') + '_' + rowIndex">
        <tr class="themed-hover-bg transition-colors" @click="handleRowClick(row, rowIndex)">
          <!-- 选择列 -->
          <template x-if="selectable">
            <td class="px-4 py-3 text-center" @click.stop>
              <input type="checkbox"
                :checked="isSelected(row[primaryKey])"
                @change="toggleSelect(row[primaryKey])"
                class="rounded border-gray-300">
            </td>
          </template>
          <!-- 数据列 -->
          <template x-for="(col, colIdx) in columns" :key="'td_' + rowIndex + '_' + colIdx">
            <td class="px-4 py-3 text-sm" :class="col.type === 'actions' ? '' : 'themed-text-primary'">
              <!-- 普通列：使用 renderCell -->
              <span x-show="col.type !== 'actions'" x-html="renderCell(row, col)"></span>
              <!-- 操作列：使用 Alpine 指令（支持 @click） -->
              <div x-show="col.type === 'actions'" class="flex items-center gap-1" @click.stop>
                <template x-for="action in (col.actions || [])" :key="action.name">
                  <button
                    x-show="!action.condition || action.condition(row)"
                    @click="$dispatch('table-action', { action: action.name, row: JSON.parse(JSON.stringify(row)) })"
                    class="px-2 py-1 text-xs rounded hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors whitespace-nowrap"
                    :class="action.class || 'themed-text-primary'"
                    x-html="(action.icon ? action.icon + ' ' : '') + action.label">
                  </button>
                </template>
              </div>
            </td>
          </template>
        </tr>
      </template>
    </tbody>
  </table>

  <!-- ===== 分页栏（#4 统一分页） ===== -->
  <template x-if="total_records > 0">
    <div class="px-4 py-3 border-t themed-divide flex justify-between items-center">
      <span class="text-sm themed-text-muted" x-text="paginationInfo"></span>
      <div class="flex items-center gap-1">
        <!-- 首页 -->
        <button @click="firstPage()" :disabled="!hasPrevPage"
          class="px-2 py-1 text-sm border rounded hover:bg-gray-50 disabled:opacity-40 disabled:cursor-not-allowed">«</button>
        <!-- 上一页 -->
        <button @click="prevPage()" :disabled="!hasPrevPage"
          class="px-2 py-1 text-sm border rounded hover:bg-gray-50 disabled:opacity-40 disabled:cursor-not-allowed">‹</button>
        <!-- 页码 -->
        <template x-for="page in visiblePages" :key="'p_' + page">
          <button @click="goToPage(page)"
            :disabled="page === '...'"
            :class="page === current_page ? 'themed-bg-primary text-white themed-border-primary' : 'hover:bg-gray-50'"
            class="px-3 py-1 text-sm border rounded min-w-[32px]"
            x-text="page"></button>
        </template>
        <!-- 下一页 -->
        <button @click="nextPage()" :disabled="!hasNextPage"
          class="px-2 py-1 text-sm border rounded hover:bg-gray-50 disabled:opacity-40 disabled:cursor-not-allowed">›</button>
        <!-- 末页 -->
        <button @click="lastPage()" :disabled="!hasNextPage"
          class="px-2 py-1 text-sm border rounded hover:bg-gray-50 disabled:opacity-40 disabled:cursor-not-allowed">»</button>
      </div>
    </div>
  </template>
</div>


      </div>

    </div>

    <!-- 属性定义 + 选项 -->
    <div x-ref="attributeModal"
         x-show="isModalOpen('attributeModal')"
         x-cloak
         class="fixed inset-0 z-50 flex items-center justify-center"
         style="display: none;">
      <div class="fixed inset-0 bg-black/50 backdrop-blur-sm" @click="hideModal('attributeModal')"></div>
      <div class="relative themed-card rounded-xl shadow-2xl w-full max-w-2xl mx-4 z-10 max-h-[92vh] overflow-y-auto">
        <div class="p-4 border-b flex justify-between items-center themed-gradient-light rounded-t-xl">
          <h5 class="font-semibold text-violet-900" x-text="editingAttributeId ? '编辑属性' : '新增属性'"></h5>
          <button type="button" @click="hideModal('attributeModal')" class="text-gray-400 hover:text-gray-600 text-xl">✕</button>
        </div>

        <div class="p-5 space-y-6">
          <form class="space-y-4" @submit.prevent="submitAttributeForm()">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div>
                <label class="block text-sm font-medium text-gray-600 mb-1">属性名称 <span class="text-red-500">*</span></label>
                <input type="text" x-model="attributeForm.attribute_name" class="w-full px-3 py-2 border rounded-lg text-sm" required>
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-600 mb-1">属性编码 <span class="text-red-500">*</span></label>
                <input type="text" x-model="attributeForm.attribute_code" class="w-full px-3 py-2 border rounded-lg text-sm font-mono" required>
              </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div>
                <label class="block text-sm font-medium text-gray-600 mb-1">输入类型</label>
                <select x-model="attributeForm.input_type" class="w-full px-3 py-2 border rounded-lg text-sm">
                  <option value="select">select（选项）</option>
                  <option value="text">text</option>
                  <option value="number">number</option>
                </select>
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-600 mb-1">排序</label>
                <input type="number" x-model.number="attributeForm.sort_order" class="w-full px-3 py-2 border rounded-lg text-sm">
              </div>
            </div>
            <div class="flex flex-wrap gap-4">
              <label class="inline-flex items-center gap-2 text-sm">
                <input type="checkbox" x-model="attributeForm.is_required" class="rounded border-gray-300"> 必填
              </label>
              <label class="inline-flex items-center gap-2 text-sm">
                <input type="checkbox" x-model="attributeForm.is_sale_attr" class="rounded border-gray-300"> 销售属性
              </label>
              <label class="inline-flex items-center gap-2 text-sm">
                <input type="checkbox" x-model="attributeForm.is_searchable" class="rounded border-gray-300"> 可搜索
              </label>
              <label class="inline-flex items-center gap-2 text-sm">
                <input type="checkbox" x-model="attributeForm.is_enabled" class="rounded border-gray-300"> 启用
              </label>
            </div>
            <div class="flex justify-end">
              <button type="submit" :disabled="saving" class="px-4 py-2 text-sm bg-violet-600 text-white rounded-lg hover:bg-violet-700 disabled:opacity-50">
                保存属性定义
              </button>
            </div>
          </form>

          <div class="border-t pt-4" x-show="editingAttributeId">
            <h6 class="text-sm font-semibold text-gray-800 mb-3">选项列表（select 类型）</h6>
            <div class="flex flex-wrap gap-2 mb-3">
              <input type="text" x-model="newOption.option_value" placeholder="选项值" class="flex-1 min-w-[120px] px-3 py-2 border rounded-lg text-sm">
              <input type="number" x-model.number="newOption.sort_order" placeholder="排序" class="w-24 px-3 py-2 border rounded-lg text-sm">
              <button type="button" @click="addOptionRow()" :disabled="saving" class="px-3 py-2 text-sm bg-gray-800 text-white rounded-lg disabled:opacity-50"
                      x-text="editingOption ? '保存选项' : '添加选项'"></button>
              <button type="button" x-show="editingOption" @click="cancelEditOption()" class="px-3 py-2 text-sm border rounded-lg">取消编辑</button>
            </div>
            <div class="overflow-x-auto border rounded-lg">
              <table class="w-full text-sm">
                <thead class="bg-gray-50 text-gray-600">
                  <tr>
                    <th class="px-3 py-2 text-left">选项值</th>
                    <th class="px-3 py-2 text-left w-24">排序</th>
                    <th class="px-3 py-2 text-right w-32">操作</th>
                  </tr>
                </thead>
                <tbody>
                  <template x-for="opt in attributeOptions" :key="opt.option_id">
                    <tr class="border-t hover:bg-gray-50/80">
                      <td class="px-3 py-2" x-text="opt.option_value"></td>
                      <td class="px-3 py-2" x-text="opt.sort_order"></td>
                      <td class="px-3 py-2 text-right space-x-1">
                        <button type="button" class="text-emerald-600 hover:underline text-xs" @click="startEditOption(opt)">编辑</button>
                        <button type="button" class="text-red-500 hover:underline text-xs" @click="deleteOptionRow(opt)">删除</button>
                      </td>
                    </tr>
                  </template>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>

  <!-- 页面底部 - 可用于全局脚本或版权信息 -->


</body>
</html>
