<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <%- include('partials/head', { 
    title: '地域管理', 
    pageStyle: '[x-cloak] { display: none !important; }' 
  }) %>
</head>
<body class="themed-bg-subtle min-h-screen">
  
  <nav class="themed-bg-primary text-white shadow-lg">
    <div class="container mx-auto px-4 py-3 flex justify-between items-center">
      <div class="flex items-center space-x-4">
        <a href="/admin/workspace.html" class="hover:text-blue-200 transition-colors">← 返回工作台</a>
        <span class="text-lg font-semibold">📍 地域管理</span>
      </div>
    </div>
  </nav>

  <main class="container mx-auto px-4 py-6" x-data="zoneManagement()" x-init="init()" x-cloak>

    <!-- Tab 切换 -->
    <div class="flex gap-2 mb-4">
      <button @click="current_tab = 'zones'; loadZones()"
        :class="current_tab === 'zones' ? 'bg-blue-500 text-white' : 'bg-white text-gray-700 hover:bg-gray-100'"
        class="px-4 py-2 rounded-lg text-sm font-medium shadow-sm transition-colors">
        🗺️ 地域区域
      </button>
      <button @click="current_tab = 'groups'; loadGroups()"
        :class="current_tab === 'groups' ? 'bg-blue-500 text-white' : 'bg-white text-gray-700 hover:bg-gray-100'"
        class="px-4 py-2 rounded-lg text-sm font-medium shadow-sm transition-colors">
        🔗 联合广告组
      </button>
    </div>

    <!-- ===== 地域区域 Tab ===== -->
    <div x-show="current_tab === 'zones'">
      <!-- 操作说明 -->
      <div class="p-3 rounded-xl bg-gradient-to-r from-blue-50 to-cyan-50 border border-blue-200/60 text-sm text-blue-800 mb-4">
        <span class="font-semibold">💡 说明：</span>管理商圈和区域两级地域分类。广告投放按优先级匹配：商圈 → 区域 → 全站兜底。优先级数值越小优先级越高。
      </div>

      <!-- 筛选 + 新建 -->
      <div class="flex items-center justify-between gap-4 bg-white rounded-lg shadow p-3 mb-4">
        <div class="flex items-center gap-3">
          <select x-model="zone_filters.zone_type" @change="zone_page = 1; loadZones()" class="border rounded px-3 py-1.5 text-sm">
            <option value="">全部类型</option>
            <option value="district">商圈</option>
            <option value="region">区域</option>
          </select>
          <select x-model="zone_filters.status" @change="zone_page = 1; loadZones()" class="border rounded px-3 py-1.5 text-sm">
            <option value="">全部状态</option>
            <option value="active">启用</option>
            <option value="inactive">停用</option>
          </select>
          <input type="text" x-model="zone_filters.keyword" @keyup.enter="zone_page = 1; loadZones()"
            placeholder="搜索地域名称..." class="border rounded px-3 py-1.5 text-sm w-48">
          <button @click="zone_page = 1; loadZones()" class="bg-blue-500 text-white px-3 py-1.5 rounded text-sm hover:bg-blue-600">🔍 搜索</button>
        </div>
        <button @click="showZoneForm()" class="bg-green-500 text-white px-4 py-1.5 rounded text-sm hover:bg-green-600">➕ 新建地域</button>
      </div>

      <!-- 列表 -->
      <div class="bg-white rounded-lg shadow overflow-hidden">
        <template x-if="zones_loading">
          <div class="p-8 text-center text-gray-500">加载中...</div>
        </template>
        <template x-if="!zones_loading && zones.length === 0">
          <div class="p-8 text-center text-gray-400">暂无地域数据</div>
        </template>
        <template x-if="!zones_loading && zones.length > 0">
          <table class="w-full text-sm">
            <thead class="bg-gray-50">
              <tr>
                <th class="px-4 py-3 text-left">ID</th>
                <th class="px-4 py-3 text-left">名称</th>
                <th class="px-4 py-3 text-left">类型</th>
                <th class="px-4 py-3 text-left">优先级</th>
                <th class="px-4 py-3 text-left">上级区域</th>
                <th class="px-4 py-3 text-left">状态</th>
                <th class="px-4 py-3 text-left">创建时间</th>
                <th class="px-4 py-3 text-left">操作</th>
              </tr>
            </thead>
            <tbody>
              <template x-for="zone in zones" :key="zone.zone_id">
                <tr class="border-t hover:bg-gray-50">
                  <td class="px-4 py-3" x-text="zone.zone_id"></td>
                  <td class="px-4 py-3 font-medium" x-text="zone.zone_name"></td>
                  <td class="px-4 py-3">
                    <span class="px-2 py-0.5 rounded text-xs text-white"
                      :class="zone.zone_type === 'district' ? 'bg-purple-500' : 'bg-teal-500'"
                      x-text="zone.zone_type === 'district' ? '商圈' : '区域'"></span>
                  </td>
                  <td class="px-4 py-3" x-text="zone.priority"></td>
                  <td class="px-4 py-3" x-text="zone.parent_zone?.zone_name || '-'"></td>
                  <td class="px-4 py-3">
                    <span class="px-2 py-0.5 rounded text-xs text-white"
                      :class="zone.status === 'active' ? 'bg-green-500' : 'bg-gray-400'"
                      x-text="zone.status === 'active' ? '启用' : '停用'"></span>
                  </td>
                  <td class="px-4 py-3 text-gray-500" x-text="zone.created_at"></td>
                  <td class="px-4 py-3">
                    <div class="flex gap-2">
                      <button @click="editZone(zone)" class="text-blue-600 hover:text-blue-800 text-xs">编辑</button>
                      <button @click="toggleZoneStatus(zone)"
                        class="text-xs" :class="zone.status === 'active' ? 'text-orange-600 hover:text-orange-800' : 'text-green-600 hover:text-green-800'"
                        x-text="zone.status === 'active' ? '停用' : '启用'"></button>
                      <button @click="deleteZone(zone.zone_id)" class="text-red-600 hover:text-red-800 text-xs">删除</button>
                    </div>
                  </td>
                </tr>
              </template>
            </tbody>
          </table>
        </template>
      </div>

      <!-- 分页 -->
      <div class="flex justify-between items-center mt-4" x-show="zones_total > 0">
        <span class="text-sm text-gray-500" x-text="'共 ' + zones_total + ' 条记录'"></span>
        <div class="flex gap-2">
          <button @click="zone_page--; loadZones()" :disabled="zone_page <= 1"
            class="px-3 py-1 border rounded text-sm disabled:opacity-50">上一页</button>
          <span class="px-3 py-1 text-sm" x-text="zone_page + ' / ' + Math.ceil(zones_total / 20)"></span>
          <button @click="zone_page++; loadZones()" :disabled="zone_page >= Math.ceil(zones_total / 20)"
            class="px-3 py-1 border rounded text-sm disabled:opacity-50">下一页</button>
        </div>
      </div>
    </div>

    <!-- ===== 联合广告组 Tab ===== -->
    <div x-show="current_tab === 'groups'">
      <div class="p-3 rounded-xl bg-gradient-to-r from-indigo-50 to-violet-50 border border-indigo-200/60 text-sm text-indigo-800 mb-4">
        <span class="font-semibold">💡 说明：</span>联合广告组将多个地域区域组合为一个投放组，支持累加(sum)、折扣(discount)、固定价(fixed)三种定价模式。
      </div>

      <div class="flex items-center justify-between gap-4 bg-white rounded-lg shadow p-3 mb-4">
        <div class="flex items-center gap-3">
          <input type="text" x-model="group_filters.keyword" @keyup.enter="group_page = 1; loadGroups()"
            placeholder="搜索联合组名称..." class="border rounded px-3 py-1.5 text-sm w-48">
          <button @click="group_page = 1; loadGroups()" class="bg-blue-500 text-white px-3 py-1.5 rounded text-sm hover:bg-blue-600">🔍 搜索</button>
        </div>
        <button @click="showGroupForm()" class="bg-green-500 text-white px-4 py-1.5 rounded text-sm hover:bg-green-600">➕ 新建联合组</button>
      </div>

      <div class="bg-white rounded-lg shadow overflow-hidden">
        <template x-if="groups_loading">
          <div class="p-8 text-center text-gray-500">加载中...</div>
        </template>
        <template x-if="!groups_loading && groups.length === 0">
          <div class="p-8 text-center text-gray-400">暂无联合广告组</div>
        </template>
        <template x-if="!groups_loading && groups.length > 0">
          <table class="w-full text-sm">
            <thead class="bg-gray-50">
              <tr>
                <th class="px-4 py-3 text-left">ID</th>
                <th class="px-4 py-3 text-left">组名称</th>
                <th class="px-4 py-3 text-left">定价模式</th>
                <th class="px-4 py-3 text-left">折扣率/固定价</th>
                <th class="px-4 py-3 text-left">成员数</th>
                <th class="px-4 py-3 text-left">状态</th>
                <th class="px-4 py-3 text-left">操作</th>
              </tr>
            </thead>
            <tbody>
              <template x-for="group in groups" :key="group.group_id">
                <tr class="border-t hover:bg-gray-50">
                  <td class="px-4 py-3" x-text="group.group_id"></td>
                  <td class="px-4 py-3 font-medium" x-text="group.group_name"></td>
                  <td class="px-4 py-3">
                    <span class="px-2 py-0.5 rounded text-xs text-white"
                      :class="{'bg-blue-500': group.pricing_mode === 'sum', 'bg-orange-500': group.pricing_mode === 'discount', 'bg-green-500': group.pricing_mode === 'fixed'}"
                      x-text="PRICING_MODE_MAP[group.pricing_mode] || group.pricing_mode"></span>
                  </td>
                  <td class="px-4 py-3" x-text="group.pricing_mode === 'discount' ? (group.discount_rate * 100 + '%') : (group.pricing_mode === 'fixed' ? (group.fixed_price + ' 💎') : '-')"></td>
                  <td class="px-4 py-3" x-text="group.members?.length || 0"></td>
                  <td class="px-4 py-3">
                    <span class="px-2 py-0.5 rounded text-xs text-white"
                      :class="group.status === 'active' ? 'bg-green-500' : 'bg-gray-400'"
                      x-text="group.status === 'active' ? '启用' : '停用'"></span>
                  </td>
                  <td class="px-4 py-3">
                    <div class="flex gap-2">
                      <button @click="editGroup(group)" class="text-blue-600 hover:text-blue-800 text-xs">编辑</button>
                      <button @click="deleteGroup(group.group_id)" class="text-red-600 hover:text-red-800 text-xs">删除</button>
                    </div>
                  </td>
                </tr>
              </template>
            </tbody>
          </table>
        </template>
      </div>
    </div>

    <!-- ===== 地域表单弹窗 ===== -->
    <div x-show="zone_form_visible" x-cloak class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50" @click.self="zone_form_visible = false">
      <div class="bg-white rounded-lg shadow-xl w-full max-w-md p-6">
        <h3 class="text-lg font-semibold mb-4" x-text="zone_form.zone_id ? '编辑地域' : '新建地域'"></h3>
        <div class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">地域类型</label>
            <select x-model="zone_form.zone_type" class="w-full border rounded px-3 py-2 text-sm">
              <option value="district">商圈</option>
              <option value="region">区域</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">地域名称</label>
            <input type="text" x-model="zone_form.zone_name" class="w-full border rounded px-3 py-2 text-sm" placeholder="如：国贸CBD">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">匹配优先级（越小越优先）</label>
            <input type="number" x-model.number="zone_form.priority" class="w-full border rounded px-3 py-2 text-sm" min="1" max="999">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">上级区域ID（可选）</label>
            <input type="number" x-model.number="zone_form.parent_zone_id" class="w-full border rounded px-3 py-2 text-sm" placeholder="留空表示顶级区域">
          </div>
        </div>
        <div class="flex justify-end gap-3 mt-6">
          <button @click="zone_form_visible = false" class="px-4 py-2 border rounded text-sm hover:bg-gray-50">取消</button>
          <button @click="saveZone()" class="px-4 py-2 bg-blue-500 text-white rounded text-sm hover:bg-blue-600">保存</button>
        </div>
      </div>
    </div>

    <!-- ===== 联合组表单弹窗 ===== -->
    <div x-show="group_form_visible" x-cloak class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50" @click.self="group_form_visible = false">
      <div class="bg-white rounded-lg shadow-xl w-full max-w-md p-6">
        <h3 class="text-lg font-semibold mb-4" x-text="group_form.group_id ? '编辑联合组' : '新建联合组'"></h3>
        <div class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">联合组名称</label>
            <input type="text" x-model="group_form.group_name" class="w-full border rounded px-3 py-2 text-sm" placeholder="如：CBD商圈联合投放组">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">定价模式</label>
            <select x-model="group_form.pricing_mode" class="w-full border rounded px-3 py-2 text-sm">
              <option value="sum">累加（各区域价格累加）</option>
              <option value="discount">折扣（累加后乘折扣率）</option>
              <option value="fixed">固定价（使用联合固定价）</option>
            </select>
          </div>
          <div x-show="group_form.pricing_mode === 'discount'">
            <label class="block text-sm font-medium text-gray-700 mb-1">折扣率（0.01-1.00）</label>
            <input type="number" x-model.number="group_form.discount_rate" class="w-full border rounded px-3 py-2 text-sm" step="0.01" min="0.01" max="1">
          </div>
          <div x-show="group_form.pricing_mode === 'fixed'">
            <label class="block text-sm font-medium text-gray-700 mb-1">固定联合价（💎钻石）</label>
            <input type="number" x-model.number="group_form.fixed_price" class="w-full border rounded px-3 py-2 text-sm" min="0">
          </div>
        </div>
        <div class="flex justify-end gap-3 mt-6">
          <button @click="group_form_visible = false" class="px-4 py-2 border rounded text-sm hover:bg-gray-50">取消</button>
          <button @click="saveGroup()" class="px-4 py-2 bg-blue-500 text-white rounded text-sm hover:bg-blue-600">保存</button>
        </div>
      </div>
    </div>

  </main>

  <%- include('partials/footer') %>

  <script type="module">
    import { Alpine, createPageMixin } from './src/alpine/index.js'
    import { logger } from './src/utils/logger.js'
    import { request, buildURL, API_PREFIX } from './src/api/base.js'
    import { SYSTEM_ENDPOINTS } from './src/api/system/index.js'

    document.addEventListener('alpine:init', () => {
      Alpine.data('zoneManagement', () => ({
        ...createPageMixin(),

        // ===== 状态 =====
        current_tab: 'zones',

        zones: [],
        zones_loading: false,
        zones_total: 0,
        zone_page: 1,
        zone_filters: { zone_type: '', status: '', keyword: '' },

        groups: [],
        groups_loading: false,
        groups_total: 0,
        group_page: 1,
        group_filters: { keyword: '' },

        zone_form_visible: false,
        zone_form: { zone_id: null, zone_type: 'district', zone_name: '', priority: 10, parent_zone_id: null },

        group_form_visible: false,
        group_form: { group_id: null, group_name: '', pricing_mode: 'sum', discount_rate: 1.0, fixed_price: null },

        PRICING_MODE_MAP: { sum: '累加', discount: '折扣', fixed: '固定价' },

        // ===== 初始化 =====
        async init() {
          logger.info('[ZoneManagement] 页面初始化')
          await this.loadZones()
        },

        // ===== 地域 CRUD =====
        async loadZones() {
          this.zones_loading = true
          try {
            const params = new URLSearchParams({ page: this.zone_page, page_size: 20 })
            if (this.zone_filters.zone_type) params.set('zone_type', this.zone_filters.zone_type)
            if (this.zone_filters.status) params.set('status', this.zone_filters.status)
            if (this.zone_filters.keyword) params.set('keyword', this.zone_filters.keyword)

            const response = await request({
              url: SYSTEM_ENDPOINTS.AD_ZONE_LIST + '?' + params.toString(),
              method: 'GET'
            })
            if (response?.success) {
              this.zones = response.data?.rows || []
              this.zones_total = response.data?.count || 0
            }
          } catch (error) {
            logger.error('加载地域列表失败:', error)
          } finally {
            this.zones_loading = false
          }
        },

        showZoneForm() {
          this.zone_form = { zone_id: null, zone_type: 'district', zone_name: '', priority: 10, parent_zone_id: null }
          this.zone_form_visible = true
        },

        editZone(zone) {
          this.zone_form = {
            zone_id: zone.zone_id,
            zone_type: zone.zone_type,
            zone_name: zone.zone_name,
            priority: zone.priority,
            parent_zone_id: zone.parent_zone_id
          }
          this.zone_form_visible = true
        },

        async saveZone() {
          try {
            const data = { ...this.zone_form }
            if (!data.parent_zone_id) delete data.parent_zone_id
            let response
            if (data.zone_id) {
              const url = buildURL(SYSTEM_ENDPOINTS.AD_ZONE_UPDATE, { id: data.zone_id })
              response = await request({ url, method: 'PUT', data })
            } else {
              response = await request({ url: SYSTEM_ENDPOINTS.AD_ZONE_CREATE, method: 'POST', data })
            }
            if (response?.success) {
              Alpine.store('notification').show(data.zone_id ? '地域更新成功' : '地域创建成功', 'success')
              this.zone_form_visible = false
              await this.loadZones()
            }
          } catch (error) {
            logger.error('保存地域失败:', error)
            Alpine.store('notification').show('保存地域失败: ' + error.message, 'error')
          }
        },

        async toggleZoneStatus(zone) {
          const newStatus = zone.status === 'active' ? 'inactive' : 'active'
          try {
            const url = buildURL(SYSTEM_ENDPOINTS.AD_ZONE_UPDATE, { id: zone.zone_id })
            const response = await request({ url, method: 'PUT', data: { status: newStatus } })
            if (response?.success) {
              Alpine.store('notification').show(`地域已${newStatus === 'active' ? '启用' : '停用'}`, 'success')
              await this.loadZones()
            }
          } catch (error) {
            logger.error('切换地域状态失败:', error)
          }
        },

        async deleteZone(zoneId) {
          if (!confirm('确定删除该地域？此操作不可恢复。')) return
          try {
            const url = buildURL(SYSTEM_ENDPOINTS.AD_ZONE_DELETE, { id: zoneId })
            const response = await request({ url, method: 'DELETE' })
            if (response?.success) {
              Alpine.store('notification').show('地域已删除', 'success')
              await this.loadZones()
            }
          } catch (error) {
            logger.error('删除地域失败:', error)
            Alpine.store('notification').show('删除失败: ' + error.message, 'error')
          }
        },

        // ===== 联合组 CRUD =====
        async loadGroups() {
          this.groups_loading = true
          try {
            const params = new URLSearchParams({ page: this.group_page, page_size: 20 })
            if (this.group_filters.keyword) params.set('keyword', this.group_filters.keyword)

            const response = await request({
              url: SYSTEM_ENDPOINTS.AD_ZONE_GROUP_LIST + '?' + params.toString(),
              method: 'GET'
            })
            if (response?.success) {
              this.groups = response.data?.rows || []
              this.groups_total = response.data?.count || 0
            }
          } catch (error) {
            logger.error('加载联合组列表失败:', error)
          } finally {
            this.groups_loading = false
          }
        },

        showGroupForm() {
          this.group_form = { group_id: null, group_name: '', pricing_mode: 'sum', discount_rate: 1.0, fixed_price: null }
          this.group_form_visible = true
        },

        editGroup(group) {
          this.group_form = {
            group_id: group.group_id,
            group_name: group.group_name,
            pricing_mode: group.pricing_mode,
            discount_rate: group.discount_rate,
            fixed_price: group.fixed_price
          }
          this.group_form_visible = true
        },

        async saveGroup() {
          try {
            const data = { ...this.group_form }
            let response
            if (data.group_id) {
              const url = buildURL(SYSTEM_ENDPOINTS.AD_ZONE_GROUP_UPDATE, { id: data.group_id })
              response = await request({ url, method: 'PUT', data })
            } else {
              response = await request({ url: SYSTEM_ENDPOINTS.AD_ZONE_GROUP_CREATE, method: 'POST', data })
            }
            if (response?.success) {
              Alpine.store('notification').show(data.group_id ? '联合组更新成功' : '联合组创建成功', 'success')
              this.group_form_visible = false
              await this.loadGroups()
            }
          } catch (error) {
            logger.error('保存联合组失败:', error)
            Alpine.store('notification').show('保存失败: ' + error.message, 'error')
          }
        },

        async deleteGroup(groupId) {
          if (!confirm('确定删除该联合组？关联的成员记录也会一并删除。')) return
          try {
            const url = buildURL(SYSTEM_ENDPOINTS.AD_ZONE_GROUP_DELETE, { id: groupId })
            const response = await request({ url, method: 'DELETE' })
            if (response?.success) {
              Alpine.store('notification').show('联合组已删除', 'success')
              await this.loadGroups()
            }
          } catch (error) {
            logger.error('删除联合组失败:', error)
            Alpine.store('notification').show('删除失败: ' + error.message, 'error')
          }
        }
      }))
    })
  </script>
</body>
</html>
